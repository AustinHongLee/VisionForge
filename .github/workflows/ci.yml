name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  constitution-guard:
    name: 憲法守門（D1/D13）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 禁止 import 掃描
        run: python scripts/check_forbidden_imports.py

  core:
    name: core 契約（ruff + pytest）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: 安裝
        run: uv sync
      - name: Lint
        run: uv run ruff check core
      - name: 契約測試
        run: uv run pytest core/tests -q
      - name: 契約 Schema 漂移檢查
        run: uv run python scripts/export_contract_schema.py --check

  app:
    name: app 服務（ruff + pytest）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: 安裝
        run: uv sync
      - name: Lint
        run: uv run ruff check app
      - name: 服務測試
        run: uv run pytest app/tests -q

  ui:
    name: ui 殼（build + test + depcruise）
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: 安裝
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Test
        run: pnpm test
      - name: Dependency cruise
        run: pnpm depcruise
      - name: TS 契約型別漂移檢查
        run: pnpm run check:contracts

  pr-scope:
    name: PR 範圍分類（§3-2 資訊性）
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 分類變更範圍
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          python scripts/check_pr_scope.py --base "origin/${{ github.base_ref }}"
